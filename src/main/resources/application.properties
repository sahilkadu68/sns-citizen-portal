# Server port - Render assigns a dynamic PORT
server.port=${PORT:8080}

# Database connection (Parameterized for Render/Aiven)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sns_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool - increase timeouts for cloud DB
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# JWT Configuration (Parameterized)
sns.app.jwtSecret=${JWT_SECRET:NagrikSevaSecretKeyMustBeLongEnoughForHS512AlgorithmSecurity2025}
sns.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

